<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color (Android) -->
    <meta name="theme-color" content="#1976d2" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#1976d2"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0d47a1"
    />

    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SGQ Audit" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/icon-152x152.svg"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/icon-192x192.svg"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="32x32"
      href="/icons/icon-32x32.svg"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="16x16"
      href="/icons/icon-16x16.svg"
    />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#1976d2" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- SEO & Description -->
    <meta
      name="description"
      content="Sistema di Gestione per la Qualità ISO 9001:2015 - Audit checklist offline-first con sincronizzazione SQL Server"
    />
    <meta
      name="keywords"
      content="ISO 9001, audit, qualità, checklist, QS Studio"
    />
    <meta name="author" content="QS Studio" />

    <title>SGQ ISO 9001:2015 - QS Studio</title>

    <!-- Eruda Mobile Console (solo per debug Android) -->
    <script>
      // Attiva Eruda solo su mobile o con ?debug=true
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(
        navigator.userAgent,
      );
      const debugMode = window.location.search.includes("debug=true");

      if (isMobile || debugMode) {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js";
        script.onload = () => {
          eruda.init();
          console.log(
            "🔧 Eruda Mobile Console attivata - Tap icona per aprire",
          );
        };
        document.head.appendChild(script);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => {
              console.log("✅ Service Worker registered:", reg.scope);

              // Check for updates
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                console.log("🔄 New Service Worker installing...");
                newWorker.addEventListener("statechange", () => {
                  if (
                    newWorker.state === "installed" &&
                    navigator.serviceWorker.controller
                  ) {
                    console.log("⚠️ New version available - refresh to update");
                    // Opzionale: mostra toast per reload
                  }
                });
              });
            })
            .catch((err) => console.error("❌ SW registration failed:", err));
        });
      }
    </script>
  </body>
</html>
