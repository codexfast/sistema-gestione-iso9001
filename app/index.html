<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color (Android) -->
    <meta name="theme-color" content="#1976d2" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#1976d2"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0d47a1"
    />

    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SGQ Audit" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/icon-152x152.svg"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/icon-192x192.svg"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="32x32"
      href="/icons/icon-32x32.svg"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="16x16"
      href="/icons/icon-16x16.svg"
    />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#1976d2" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- SEO & Description -->
    <meta
      name="description"
      content="Sistema di Gestione per la Qualità ISO 9001:2015 - Audit checklist offline-first con sincronizzazione SQL Server"
    />
    <meta
      name="keywords"
      content="ISO 9001, audit, qualità, checklist, QS Studio"
    />
    <meta name="author" content="QS Studio" />

    <title>SGQ ISO 9001:2015 - QS Studio</title>

    <!-- Eruda Mobile Console (solo per debug Android) -->
    <script>
      // Attiva Eruda solo su mobile o con ?debug=true
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(
        navigator.userAgent,
      );
      const debugMode = window.location.search.includes("debug=true");

      if (isMobile || debugMode) {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js";
        script.onload = () => {
          eruda.init();
          console.log(
            "🔧 Eruda Mobile Console attivata - Tap icona per aprire",
          );
        };
        document.head.appendChild(script);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker: disabilitato in dev (localhost/porta 5173), attivo su Netlify -->
    <script>
      if ("serviceWorker" in navigator) {
        var isDev = /^(localhost|127\.0\.0\.1|\[::1\]|::1)$/.test(window.location.hostname) || window.location.port === "5173" || window.location.port === "3000";
        if (isDev) {
          console.log("[SGQ] Dev mode: Service Worker disabilitato per proxy API");
          navigator.serviceWorker.getRegistrations().then(function(regs) { regs.forEach(function(r) { r.unregister(); }); });
        } else {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => {
              console.log("✅ Service Worker registered:", reg.scope);

              // Controlla aggiornamenti ogni 60 secondi (utile per sessioni lunghe)
              setInterval(() => reg.update(), 60000);

              // Check for updates
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                console.log("🔄 New Service Worker installing...");
                newWorker.addEventListener("statechange", () => {
                  if (
                    newWorker.state === "installed" &&
                    navigator.serviceWorker.controller
                  ) {
                    console.log("⬆️ Nuovo aggiornamento pronto, reload in corso...");
                  }
                });
              });
            })
            .catch((err) => console.error("❌ SW registration failed:", err));

          // Auto-reload quando il nuovo SW prende controllo
          // (skipWaiting + clients.claim nel SW triggera questo evento)
          let reloading = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (reloading) return;
            reloading = true;

            // Mostra overlay prima del reload
            const overlay = document.createElement("div");
            overlay.id = "sw-update-overlay";
            overlay.style.cssText = [
              "position:fixed","top:0","left:0","width:100%","height:100%",
              "background:rgba(30,64,175,0.92)","color:#fff",
              "display:flex","flex-direction:column",
              "align-items:center","justify-content:center",
              "z-index:99999","font-family:sans-serif",
              "gap:16px"
            ].join(";");
            overlay.innerHTML = [
              "<div style='font-size:2rem'>⬆️</div>",
              "<div style='font-size:1.2rem;font-weight:600'>Aggiornamento disponibile</div>",
              "<div style='font-size:0.95rem;opacity:0.85'>Ricarico l'app con la nuova versione...</div>"
            ].join("");
            document.body.appendChild(overlay);

            setTimeout(() => window.location.reload(), 1500);
          });
        });
        }
      }
    </script>
  </body>
</html>
