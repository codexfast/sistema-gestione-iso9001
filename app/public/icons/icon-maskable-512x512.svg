<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="640" fill="#1976d2"/>
  <g transform="translate(64, 64)">
    <!-- Cerchio sfondo -->
    <circle cx="256" cy="256" r="192" fill="#1976d2"/>
    
    <!-- Lettera Q stilizzata -->
