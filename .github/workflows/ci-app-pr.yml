# Esegue test + build dell'app su ogni Pull Request verso main.
# Complementare ai Deploy Preview Netlify: fallimenti qui bloccano il merge consapevole.
name: CI app (Pull Request)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'netlify.toml'
      - 'docs/agent-tasks/**'
      - '.github/workflows/ci-app-pr.yml'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dipendenze
        run: npm ci

      - name: Test (Vitest)
        run: npm run test:run
        env:
          NODE_ENV: test

      - name: Build produzione
        run: npm run build
